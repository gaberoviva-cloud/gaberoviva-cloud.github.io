<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradimaq — Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" id="pwa-manifest">
  <meta name="theme-color" content="#ff7a00">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tradimaq">
  <link rel="apple-touch-icon" href="https://www.tradimaq.com.br/wp-content/uploads/2024/05/logo_cinza.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #ff7a00;
      --brand-dark: #d96500;
      --border: rgba(255,255,255,0.12);
    }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,122,0,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(255,122,0,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── TELA DE LOGIN ── */
    #login-screen {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeUp 0.45s ease both;
    }

    .login-logo {
      text-align: center;
    }
    .login-logo img {
      height: 36px;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }
    .login-logo .tagline {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
    }

    .login-box {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 20px;
      backdrop-filter: blur(12px);
    }

    .login-box h2 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 13px;
      font-size: 14px;
      font-family: inherit;
      color: white;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    .field input:focus {
      border-color: rgba(255,122,0,0.55);
      background: rgba(255,122,0,0.06);
    }

    .login-error {
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
      min-height: 16px;
      margin-bottom: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .login-error.visible { opacity: 1; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--brand);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-login:hover { background: var(--brand-dark); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: default; }

    /* ── TELA PRINCIPAL ── */
    #app-screen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #app-screen.visible {
      display: flex;
      animation: fadeUp 0.4s ease both;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 4px;
    }
    .logo-area img {
      height: 38px;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
    }
    .logo-fallback {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: white;
    }
    .logo-fallback span { color: var(--brand); }
    .logo-tagline {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    .user-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: rgba(255,122,0,0.1);
      border: 1px solid rgba(255,122,0,0.2);
      border-radius: 8px;
    }
    .user-bar span {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }
    .user-bar strong { color: var(--brand); font-weight: 600; }
    .btn-logout {
      background: none;
      border: none;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-family: inherit;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-logout:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

    /* Cards */
    .card {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: rgba(255,122,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .card-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.38);
      margin-top: 1px;
    }
    .card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 13px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
      text-decoration: none;
    }
    .btn:hover {
      background: rgba(255,122,0,0.16);
      border-color: rgba(255,122,0,0.38);
      color: white;
    }
    .btn:active { transform: scale(0.98); }
    .btn .btn-arrow {
      font-size: 12px;
      opacity: 0.35;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover .btn-arrow { opacity: 0.85; transform: translateX(3px); }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      margin-top: 6px;
    }
    footer a {
      color: rgba(255,255,255,0.32);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--brand); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }

    @media (max-width: 480px) {
      #app-screen { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     TELA DE LOGIN
══════════════════════════════════════════ -->
<div id="login-screen">

  <div class="login-logo">
    <img src="https://www.tradimaq.com.br/wp-content/uploads/2024/05/logo_cinza.png" alt="Tradimaq"
      onerror="this.outerHTML='<div style=\'font-size:24px;font-weight:700;color:white\'>TRADI<span style=\'color:#ff7a00\'>MAQ</span></div>'">
    <div class="tagline">Plataformas Elevatórias</div>
  </div>

  <div class="login-box">
    <h2>Acesso ao sistema</h2>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="inp-user" placeholder="seu usuário" autocomplete="username" autocapitalize="none">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="login-error" id="login-error">Usuário ou senha incorretos</div>

    <button class="btn-login" id="btn-entrar" onclick="tentarLogin()">Entrar</button>
  </div>

</div>

<!-- ══════════════════════════════════════════
     TELA PRINCIPAL (oculta até o login)
══════════════════════════════════════════ -->
<div id="app-screen">

  <div class="logo-area">
    <img src="https://www.tradimaq.com.br/wp-content/uploads/2024/05/logo_cinza.png" alt="Tradimaq"
      onerror="this.outerHTML='<div class=\'logo-fallback\'>TRADI<span>MAQ</span></div>'">
    <div class="logo-tagline">Plataformas Elevatórias</div>
  </div>

  <!-- Barra do usuário logado -->
  <div class="user-bar">
    <span>Olá, <strong id="label-user"></strong></span>
    <button class="btn-logout" onclick="sair()">Sair</button>
  </div>

  <!-- Status do Pátio -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-title">Status do Pátio</div>
        <div class="card-subtitle">Plataformas Genie</div>
      </div>
    </div>
    <div class="card-body">
      <button class="btn" onclick="abrir('https://gaberoviva-cloud.github.io/Pages/status_geral.html')">
        <span>Abrir status</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <!-- Vistoria Visual -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🚜</div>
      <div>
        <div class="card-title">Vistoria Visual</div>
        <div class="card-subtitle">Saída e Retorno · PDF</div>
      </div>
    </div>
    <div class="card-body">
      <button class="btn" onclick="abrir('https://gaberoviva-cloud.github.io/Pages/vistoria_tradimaq_saida_retorno.html')">
        <span>Abrir vistoria</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

</div>

<footer>
  <a href="https://www.linkedin.com/in/gabriel-v-v-roza" target="_blank">By Gabriel Roza</a>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════
//  CREDENCIAIS — edite os usuários aqui embaixo
//  Campos: user (login), pass (senha), nome (exibição na tela)
// ══════════════════════════════════════════════════════════════════
const USERS_DATA = [
  { user: "pedro.gouvea",     pass: "Pedro@2026#",  nome: "Pedro Gouvea"   },
  { user: "samuel.soares",    pass: "Samuel@2026#", nome: "Samuel Soares"  },
  { user: "washington",       pass: "W@sh2026#",    nome: "Washington"     },
  { user: "edismar",          pass: "Edismar@2026", nome: "Edismar"        },
  { user: "gabriel.resende",  pass: "G@brielR2026", nome: "Gabriel Resende"},
  { user: "juan.vieira",      pass: "JuanV@2026",   nome: "Juan Vieira"    },
  { user: "kauan.victor",     pass: "K@uanV2026",   nome: "Kauan Victor"   },
  { user: "lucas.castro",     pass: "Luc@sC2026",   nome: "Lucas Castro"   },
  { user: "braian",           pass: "Br@ian2026!",  nome: "Braian" },
  { user: "gabriel.roza",     pass: "G@brielR2026!",nome: "Gabriel Roza" },
  { user: "gederson.araujo",  pass: "Geder$2026",   nome: "Gederson Araujo" },
  { user: "lucas.gracas",     pass: "Luc@sG2026",   nome: "Lucas Graças" },
  { user: "thierry",          pass: "Thierry@2026", nome: "Thierry" },
  { user: "william.oliveira", pass: "Will!am2026",  nome: "William Oliveira" },
  { user: "daniel.barcelos",  pass: "D@nielB2026",  nome: "Daniel Barcelos" },
  { user: "jose.pires",       pass: "JoseP@2026",   nome: "José Pires" },
  { user: "maximus",          pass: "M@x2026#",     nome: "Maximus" },
  { user: "jurandir.moreira", pass: "Jur@ndir2026", nome: "Jurandir Moreira" }
];
// ══════════════════════════════════════════════════════════════════

function getUsers() {
  return USERS_DATA;
}

// Sessão simples via sessionStorage (some ao fechar o app/aba)
function sessaoAtiva() {
  return sessionStorage.getItem('trdm_u');
}

function tentarLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('btn-entrar');

  if (!u || !p) return;

  btn.disabled = true;

  const usuario = getUsers().find(x => x.user === u && x.pass === p);

  if (usuario) {
    sessionStorage.setItem('trdm_u', usuario.nome || usuario.user);
    err.classList.remove('visible');
    mostrarApp(usuario.nome || usuario.user);
  } else {
    err.classList.add('visible');
    const box = document.querySelector('.login-box');
    box.classList.remove('shake');
    void box.offsetWidth; // força reflow para reiniciar animação
    box.classList.add('shake');
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
    setTimeout(() => { btn.disabled = false; }, 400);
  }
}

function mostrarApp(nome) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('label-user').textContent = nome;
  const app = document.getElementById('app-screen');
  app.classList.add('visible');
}

function sair() {
  sessionStorage.removeItem('trdm_u');
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('login-screen').style.display = '';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

function abrir(arquivo) {
  window.location.href = arquivo;
}

// Enter no campo de senha dispara o login
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('inp-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tentarLogin();
  });
  document.getElementById('inp-user').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('inp-pass').focus();
  });

  // Verifica sessão ativa (ex: voltou de outra página)
  const s = sessaoAtiva();
  if (s) mostrarApp(s);
});
</script>

<script>
// ── PWA Manifest dinâmico ──
(function(){
  const icon = 'https://gaberoviva-cloud.github.io/Data/5202113.png';
  const m = {
    name: 'Tradimaq — Sistema',
    short_name: 'Tradimaq',
    start_url: './',
    display: 'standalone',
    background_color: '#1a1a1a',
    theme_color: '#ff7a00',
    icons: [
      { src: icon, sizes: '192x192', type: 'image/png' },
      { src: icon, sizes: '512x512', type: 'image/png' }
    ]
  };
  const blob = new Blob([JSON.stringify(m)], { type: 'application/manifest+json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
})();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `
    const C = 'tradimaq-v1';
    self.addEventListener('install', e => e.waitUntil(
      caches.open(C).then(c => c.addAll([self.location.pathname])).then(() => self.skipWaiting())
    ));
    self.addEventListener('activate', e => e.waitUntil(
      caches.keys().then(ks => Promise.all(ks.filter(k => k !== C).map(k => caches.delete(k))))
        .then(() => self.clients.claim())
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
    ));
  `;
  navigator.serviceWorker
    .register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })), { scope: './' })
    .catch(e => console.warn('SW:', e));
}
</script>

</body>
</html>
