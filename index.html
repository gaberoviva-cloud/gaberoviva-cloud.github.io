<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradimaq — Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #ff7a00;
      --brand-dark: #d96500;
      --brand-light: #fff0e0;
      --dark: #1a1a1a;
      --text: #374151;
      --muted: #6b7280;
      --border: rgba(255,255,255,0.15);
    }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow-x: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,122,0,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(255,122,0,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Logo */
    .logo-area {
      text-align: center;
      animation: fadeDown 0.5s ease both;
    }
    .logo-area img {
      height: 44px;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }
    .logo-fallback {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: white;
    }
    .logo-fallback span { color: var(--brand); }
    .logo-tagline {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    /* Cards */
    .card {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.5s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }
    .card:nth-child(4) { animation-delay: 0.3s; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,122,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .card-subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .card-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
      text-decoration: none;
    }
    .btn:hover {
      background: rgba(255,122,0,0.18);
      border-color: rgba(255,122,0,0.4);
      color: white;
    }
    .btn:active { transform: scale(0.98); }

    .btn .btn-arrow {
      font-size: 12px;
      opacity: 0.4;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover .btn-arrow {
      opacity: 0.9;
      transform: translateX(3px);
    }

    /* Grid layout for states */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .btn-grid .btn {
      justify-content: center;
      text-align: center;
    }
    .btn-grid .btn .btn-arrow { display: none; }

    /* Highlight button (Relatório) */
    .btn-highlight {
      background: linear-gradient(135deg, rgba(255,122,0,0.25), rgba(255,122,0,0.12));
      border-color: rgba(255,122,0,0.45);
      color: white;
    }
    .btn-highlight:hover {
      background: linear-gradient(135deg, rgba(255,122,0,0.4), rgba(255,122,0,0.22));
      border-color: rgba(255,122,0,0.7);
    }

    /* Divider in card */
    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 4px;
    }
    footer a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--brand); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .wrapper { max-width: 100%; }
      .btn-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Logo -->
  <div class="logo-area">
    <img src="https://www.tradimaq.com.br/wp-content/uploads/2024/05/logo_cinza.png" alt="Tradimaq"
      onerror="this.outerHTML='<div class=\\'logo-fallback\\'>TRADI<span>MAQ</span></div>'">
    <div class="logo-tagline">Plataformas Elevatórias</div>
  </div>

  <!-- Status Diário -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-title">Status Diário</div>
        <div class="card-subtitle">Pátio — Plataformas Genie</div>
      </div>
    </div>
    <div class="card-body">
      <div class="btn-grid">
        <button class="btn" onclick="abrir('/Pages/status_SP.html')">
          SP — Taubaté
        </button>
        <button class="btn" onclick="abrir('/Pages/status_GO.html')">
          GO — Goiânia
        </button>
        <button class="btn" onclick="abrir('/Pages/status_ES.html')">
          ES — Cariacica
        </button>
        <button class="btn" onclick="abrir('/Pages/status_PA.html')">
          PA — Parauapebas
        </button>
      </div>
      <div class="card-divider"></div>
      <button class="btn" onclick="abrir('/Pages/status_MG.html')">
        <span>MG — Contagem</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <!-- Controle de Ferramentas -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🔧</div>
      <div>
        <div class="card-title">Controle de Ferramentas</div>
        <div class="card-subtitle">Retirada e devolução</div>
      </div>
    </div>
    <div class="card-body">
      <button class="btn" onclick="abrir('/Pages/controle_ferramentas_alpha.html')">
        <span>Abrir controle</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <!-- Relatório Técnico -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📋</div>
      <div>
        <div class="card-title">Relatório Técnico</div>
        <div class="card-subtitle">Laudo de inspeção · Gerador de PDF</div>
      </div>
    </div>
    <div class="card-body">
      <button class="btn btn-highlight" onclick="abrir('/Pages/relatorio_tecnico_tradimaq.html')">
        <span>Abrir gerador</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

</div>

<footer>
  <a href="https://www.linkedin.com/in/gabriel-v-v-roza" target="_blank">By Gabriel Roza</a>
</footer>

<script>
  function abrir(arquivo) {
    window.location.href = arquivo;
  }
</script>

</body>
</html>
