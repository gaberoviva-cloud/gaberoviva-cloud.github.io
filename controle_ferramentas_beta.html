<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Controle de Ferramentas - Tradimaq</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#f4f6f8}
header{display:flex;align-items:center;gap:15px;background:white;padding:12px 20px;border-bottom:4px solid #ff7a00}
header img{height:35px}
.container{padding:20px}
#dashboard{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}
.card{background:white;padding:15px;border-left:5px solid #ff7a00;min-width:150px}
.card h2{margin:5px 0 0 0}
input{padding:10px;font-size:16px;border:1px solid #ccc;border-radius:4px;width:100%;box-sizing:border-box}
button{background:#ff7a00;border:none;padding:12px;color:white;font-weight:bold;border-radius:4px;cursor:pointer;margin-top:8px}
button:hover{background:#e56700}
table{width:100%;border-collapse:collapse;background:white;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;font-size:14px}
th{background:#4b5563;color:white}
.campos{display:grid;gap:10px;margin-top:20px}
.codigoBox{background:white;padding:10px;margin-top:20px;border-radius:4px}
.exportBox{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
@media(min-width:700px){
.campos{grid-template-columns:1fr 1fr 1fr}
button{width:auto;margin-top:0}
.codigoBox{display:flex;align-items:center;gap:10px}
.codigoBox input{margin-top:0}
.exportBox button{margin-top:0}
}
</style>

</head>

<body>

<header>
<img src="https://www.tradimaq.com.br/wp-content/uploads/2024/05/logo_cinza.png">
<h2>CONTROLE DE FERRAMENTAS</h2>
</header>

<div class="container">

<div id="dashboard">
<div class="card">Ferramentas totais<h2 id="totalFerramentas">0</h2></div>
<div class="card">Filtradas<h2 id="totalFiltrado">0</h2></div>
<div class="card">Selecionadas<h2 id="totalSelecionado">0</h2></div>
</div>

<div class="campos">
<div>
<label>Data</label>
<input type="date" id="data">
</div>
<div>
<label>Mecânico</label>
<input id="mecanico">
</div>
<div>
<label>Responsável</label>
<input id="responsavel">
</div>
</div>

<div class="codigoBox">
<input id="codigoSave" placeholder="Código da seleção...">
<button onclick="copiarCodigo()">Copiar Código</button>
<button onclick="gerarCodigo()">Gerar Código</button>
<button onclick="carregarCodigo()">Carregar Código</button>
</div>

<div class="exportBox">
<button onclick="gerarPDF()">Exportar PDF</button>
<button onclick="gerarExcel()">Exportar Excel</button>
</div>

<div class="exportBox">
<button onclick="limparPreset()">Lista Geral</button>
<button onclick="carregarPreset('https://gaberoviva-cloud.github.io/ferramentas_campo.csv')">Preset Técnico Campo</button>
<button onclick="carregarPreset('https://gaberoviva-cloud.github.io/ferramentas_ajudante.csv')">Preset Técnico Ajudante</button>
<button onclick="selecionarFiltradas()">Selecionar Filtradas</button>
</div>

<input id="busca" placeholder="🔎 Buscar ferramenta...">

<table>
<thead>
<tr>
<th></th>
<th>#</th>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>
<tbody id="tabela">
<tr><td colspan="4" style="text-align:center">Carregando ferramentas...</td></tr>
</tbody>
</table>

</div>

<script>

document.getElementById("data").value=new Date().toISOString().split("T")[0]

let ferramentas=[]
let filtrado=[]
let selectedCodes=new Set()
let bancoBase=[]

function normalizeStr(str){
return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

async function carregarCSV(){
const response=await fetch('https://gaberoviva-cloud.github.io/ferr.csv')
const arrayBuffer=await response.arrayBuffer()
const decoder=new TextDecoder('windows-1252')
const data=decoder.decode(arrayBuffer)

const linhas=data.split(/\r?\n/)
ferramentas=[]

linhas.forEach((linha,i)=>{
if(!linha.trim())return
const colunas=linha.split(/,|;/)
if(i===0 && normalizeStr(colunas[0]).includes("codigo"))return
if(colunas.length>=2){
ferramentas.push({codigo:colunas[0].trim(),descricao:colunas[1].trim()})
}
})

bancoBase=[...ferramentas]
filtrado=[...ferramentas]
render()
}

async function carregarPreset(url){
const response=await fetch(url)
const arrayBuffer=await response.arrayBuffer()
const decoder=new TextDecoder('windows-1252')
const data=decoder.decode(arrayBuffer)

const linhas=data.split(/\r?\n/)
ferramentas=[]

linhas.forEach((linha,i)=>{
if(!linha.trim())return
const colunas=linha.split(/,|;/)
if(i===0 && normalizeStr(colunas[0]).includes("codigo"))return
if(colunas.length>=2){
ferramentas.push({codigo:colunas[0].trim(),descricao:colunas[1].trim()})
}
})

filtrado=[...ferramentas]
selectedCodes.clear()
render()
}

function limparPreset(){
ferramentas=[...bancoBase]
filtrado=[...bancoBase]

let busca=document.getElementById("busca")
busca.value=""

selectedCodes.clear()

render()
}

carregarCSV()

function render(){
let tabela=document.getElementById("tabela")
tabela.innerHTML=""

filtrado.forEach((f,i)=>{
let tr=document.createElement("tr")
tr.innerHTML=`
<td><input type="checkbox" data-codigo="${f.codigo}" ${selectedCodes.has(f.codigo)?'checked':''} onchange="toggleSelect(this)"></td>
<td>${i+1}</td>
<td>${f.codigo}</td>
<td>${f.descricao}</td>`

tabela.appendChild(tr)
})

atualizarDashboard()
}

function selecionarFiltradas(){
for(let i=0;i<filtrado.length;i++){
selectedCodes.add(filtrado[i].codigo)
}
render()
}

function toggleSelect(c){
let code=c.dataset.codigo
if(c.checked)selectedCodes.add(code)
else selectedCodes.delete(code)

atualizarDashboard()
}

function atualizarDashboard(){
document.getElementById("totalFerramentas").innerText=ferramentas.length
document.getElementById("totalFiltrado").innerText=filtrado.length
document.getElementById("totalSelecionado").innerText=selectedCodes.size
}

function gerarCodigo(){
let texto=[...selectedCodes].join("|")
document.getElementById("codigoSave").value=btoa(texto)
}

function copiarCodigo(){
navigator.clipboard.writeText(document.getElementById("codigoSave").value)
}

function carregarCodigo(){
try{
let texto=atob(document.getElementById("codigoSave").value)
selectedCodes=new Set(texto.split("|"))
render()
}catch{alert("Código inválido")}
}

function gerarPDF() {
    const { jsPDF } = window.jspdf;
    let lista = [...selectedCodes];
    if (lista.length == 0) return alert("Nenhuma ferramenta selecionada");

    // Captura os valores dos campos
    let dataDoc = document.getElementById("data").value;
    let mecanico = document.getElementById("mecanico").value || "Não informado";
    let responsavel = document.getElementById("responsavel").value || "Não informado";

    let doc = new jsPDF();

    // Título e Informações de Cabeçalho
    doc.setFontSize(16);
    doc.text("Controle de Ferramentas - Tradimaq", 14, 20);
    
    doc.setFontSize(11);
    doc.text(`Data: ${dataDoc.split('-').reverse().join('/')}`, 14, 30);
    doc.text(`Mecânico: ${mecanico}`, 14, 37);
    doc.text(`Responsável: ${responsavel}`, 14, 44);

    // Monta o corpo da tabela
    let dadosTabela = lista.map((c, i) => {
        let f = ferramentas.find(x => x.codigo === c);
        return [i + 1, f ? f.codigo : c, f ? f.descricao : ""];
    });

    // Gera a tabela (começando após os textos acima)
    doc.autoTable({
        startY: 50,
        head: [["#", "Código", "Descrição"]],
        body: dadosTabela,
        theme: 'grid',
        headStyles: { fillColor: [75, 85, 99] } // Cor cinza do cabeçalho original
    });

    doc.save(`controle_ferramentas_${mecanico.replace(/\s+/g, '_')}.pdf`);
}

function gerarExcel(){
let lista=[...selectedCodes]
if(lista.length==0)return alert("Nenhuma ferramenta selecionada")

let dados=[["Código","Descrição"]]

lista.forEach(c=>{
let f=ferramentas.find(x=>x.codigo===c)
dados.push([f.codigo,f.descricao])
})

let ws=XLSX.utils.aoa_to_sheet(dados)
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Ferramentas")
XLSX.writeFile(wb,"controle_ferramentas.xlsx")
}

document.getElementById("busca").addEventListener("input",function(){

let termo=normalizeStr(this.value)

if(termo===""){
filtrado=[...ferramentas]
render()
return
}

filtrado=ferramentas.filter(f =>
normalizeStr(f.codigo).includes(termo) ||
normalizeStr(f.descricao).includes(termo)
)

render()

})

</script>

</body>
</html>
